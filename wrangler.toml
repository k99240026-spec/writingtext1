name = "writing-assessment"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

# 로컬 개발 시 사용 (wrangler pages dev . --kv ESSAYS)
# 프로덕션 KV 바인딩은 Cloudflare 대시보드에서 설정합니다.
# Settings > Functions > KV namespace bindings > 변수명: ESSAYS
[[kv_namespaces]]
binding = "ESSAYS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_KV_PREVIEW_NAMESPACE_ID"
